version: '3.8'

services:
  core-api:
    build:
      context: ./backend/core-api
      dockerfile: Dockerfile
    container_name: traceweave-core
    ports:
      - "4000:4000"
    environment:
      - .env
    restart: unless-stopped

  proxy-service:
    build:
      context: ./backend/proxy-service
      dockerfile: Dockerfile
    container_name: traceweave-proxy
    ports:
      - "8080:8080"
      - "8081:8081"
    restart: unless-stopped

  ai-service:
    build:
      context: ./backend/ai-service
      dockerfile: Dockerfile
    container_name: traceweave-ai
    ports:
      - "5000:5000"
    restart: unless-stopped

  gateway:
    image: nginx:alpine
    container_name: traceweave-gateway
    ports:
      - "80:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - core-api
      - ai-service
    restart: unless-stopped
