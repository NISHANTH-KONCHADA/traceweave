version: '3.8'

services:
  # -----------------------------------------------------------------
  # 1. Core API - Node.js
  # -----------------------------------------------------------------
  core-api:
    build:
      context: ./backend/core-api
      dockerfile: Dockerfile
    container_name: traceweave-core
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=development
    depends_on:
      - mongo
    volumes:
      - ./backend/core-api/src:/app/src # Hot Reload

  # -----------------------------------------------------------------
  # 2. Proxy - Python
  # -----------------------------------------------------------------
  proxy-service:
    build:
      context: ./backend/proxy-service
      dockerfile: Dockerfile
    container_name: traceweave-proxy
    ports:
      - "8080:8080"  # Proxy Port
      - "8081:8081"  # Web Interface
    volumes:
      - ./backend/proxy-service:/app

  # -----------------------------------------------------------------
  # 3. AI - Python
  # -----------------------------------------------------------------
  ai-service:
    build:
      context: ./backend/ai-service
      dockerfile: Dockerfile
    container_name: traceweave-ai
    ports:
      - "5000:5000"
    volumes:
      - ./backend/ai-service:/app

  # -----------------------------------------------------------------
  # 4. API Gateway - Nginx
  # -----------------------------------------------------------------
  gateway:
    image: nginx:alpine
    container_name: traceweave-gateway
    ports:
      - "80:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - core-api
      - ai-service

  # -----------------------------------------------------------------
  # DATA LAYER
  # -----------------------------------------------------------------

  mongo:
    image: mongo:6
    container_name: traceweave-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: